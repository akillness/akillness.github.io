<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeong Jang-young | Research-Driven AI Product Engineer</title>
    <meta
      name="description"
      content="Resume of Jeong Jang-young, a research-driven AI product engineer building multimodal QA, agent workflows, and on-device AI on top of eight years of game AI production experience."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    >
    <style>
      :root {
        --paper: #f5efe3;
        --paper-strong: #fffaf1;
        --surface: rgba(255, 250, 241, 0.78);
        --surface-strong: rgba(255, 251, 244, 0.95);
        --ink: #1f2430;
        --muted: #5e636d;
        --line: rgba(31, 36, 48, 0.12);
        --accent: #e7692e;
        --accent-soft: rgba(231, 105, 46, 0.12);
        --accent-deep: #a6461e;
        --accent-alt: #1f7a72;
        --shadow: 0 24px 80px rgba(31, 36, 48, 0.12);
        --shadow-soft: 0 16px 36px rgba(31, 36, 48, 0.08);
        --radius-xl: 34px;
        --radius-lg: 24px;
        --radius-md: 18px;
        --page-width: 1180px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: 'Manrope', sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(231, 105, 46, 0.18), transparent 32%),
          radial-gradient(circle at top right, rgba(31, 122, 114, 0.16), transparent 28%),
          linear-gradient(180deg, #efe5d3 0%, #f5efe3 42%, #f7f3ea 100%);
        min-height: 100vh;
        line-height: 1.7;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(31, 36, 48, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(31, 36, 48, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 92%);
        pointer-events: none;
        z-index: 0;
      }

      .ambient {
        position: fixed;
        border-radius: 999px;
        filter: blur(28px);
        opacity: 0.45;
        pointer-events: none;
        z-index: 0;
        animation: drift 16s ease-in-out infinite alternate;
      }

      .ambient-one {
        width: 320px;
        height: 320px;
        top: 120px;
        right: -60px;
        background: rgba(231, 105, 46, 0.16);
      }

      .ambient-two {
        width: 240px;
        height: 240px;
        bottom: 80px;
        left: -40px;
        background: rgba(31, 122, 114, 0.14);
        animation-duration: 18s;
      }

      .page {
        position: relative;
        z-index: 1;
        width: min(var(--page-width), calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0 72px;
      }

      .section-shell {
        position: relative;
        margin-bottom: 24px;
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        overflow: hidden;
      }

      .section-shell::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid rgba(255, 255, 255, 0.32);
        pointer-events: none;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.95fr);
        gap: 28px;
        padding-top: 36px;
      }

      .hero-copy,
      .hero-panel {
        position: relative;
        z-index: 1;
      }

      .hero-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .eyebrow,
      .section-kicker,
      .mini-label,
      .timeline-period,
      .signal-meta {
        font-family: 'IBM Plex Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .eyebrow,
      .section-kicker {
        color: var(--accent-deep);
        font-size: 0.82rem;
      }

      .lang-switcher {
        display: inline-flex;
        padding: 5px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.66);
        box-shadow: var(--shadow-soft);
      }

      .lang-btn {
        border: 0;
        background: transparent;
        color: var(--muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        padding: 9px 12px;
        border-radius: 999px;
        cursor: pointer;
        transition:
          background 180ms ease,
          color 180ms ease,
          transform 180ms ease;
      }

      .lang-btn.is-active {
        background: rgba(231, 105, 46, 0.14);
        color: var(--accent-deep);
      }

      .lang-btn:hover,
      .lang-btn:focus-visible {
        transform: translateY(-1px);
        outline: none;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: 'Space Grotesk', sans-serif;
        letter-spacing: -0.03em;
      }

      h1 {
        font-size: clamp(3rem, 6vw, 5.1rem);
        line-height: 0.92;
        margin-top: 16px;
      }

      .hero-role {
        margin: 18px 0 16px;
        font-size: 1.18rem;
        color: var(--accent-alt);
        font-weight: 700;
      }

      .hero-summary {
        max-width: 62ch;
        margin: 0;
        font-size: 1.05rem;
        color: var(--muted);
      }

      .link-row,
      .chip-row,
      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .link-row {
        margin-top: 24px;
      }

      .link-pill,
      .chip,
      .tag,
      .stat-card,
      .story-card,
      .signal-card,
      .tool-card,
      .principle-card,
      .education-card {
        border: 1px solid var(--line);
        background: var(--surface-strong);
        box-shadow: var(--shadow-soft);
      }

      .link-pill,
      .chip,
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        text-decoration: none;
      }

      .link-pill {
        color: var(--ink);
        font-weight: 700;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .link-pill::before {
        content: '↗';
        color: var(--accent);
        font-size: 0.95rem;
      }

      .link-pill:hover,
      .link-pill:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(231, 105, 46, 0.4);
        background: #fffdf8;
        outline: none;
      }

      .chip-row {
        margin-top: 18px;
      }

      .chip,
      .tag {
        color: var(--muted);
        font-size: 0.93rem;
      }

      .chip {
        background: rgba(255, 255, 255, 0.54);
      }

      .hero-panel {
        padding: 22px;
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 248, 237, 0.95)),
          radial-gradient(circle at top right, rgba(231, 105, 46, 0.12), transparent 48%);
        border: 1px solid rgba(31, 36, 48, 0.1);
      }

      .mini-label {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-deep);
        font-size: 0.72rem;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .stat-card {
        padding: 18px;
        border-radius: var(--radius-md);
      }

      .stat-value {
        display: block;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2rem;
        line-height: 1;
      }

      .stat-label {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .focus-note {
        margin-top: 18px;
        padding: 18px;
        border-radius: var(--radius-md);
        background: rgba(31, 122, 114, 0.08);
        border: 1px solid rgba(31, 122, 114, 0.16);
      }

      .focus-note p {
        margin: 0 0 10px;
        font-weight: 800;
      }

      .compact-list,
      .timeline-points,
      .signal-list,
      .tool-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .compact-list li,
      .timeline-points li,
      .signal-list li,
      .tool-list li {
        position: relative;
        padding-left: 18px;
        color: var(--muted);
      }

      .compact-list li + li,
      .timeline-points li + li,
      .signal-list li + li,
      .tool-list li + li {
        margin-top: 8px;
      }

      .compact-list li::before,
      .timeline-points li::before,
      .signal-list li::before,
      .tool-list li::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0.72em;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-alt));
      }

      .section-heading {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 24px;
      }

      .section-heading h2 {
        font-size: clamp(1.9rem, 3vw, 2.8rem);
      }

      .section-description {
        max-width: 64ch;
        margin: 0;
        color: var(--muted);
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .story-card,
      .signal-card,
      .tool-card,
      .principle-card,
      .education-card {
        padding: 24px;
        border-radius: var(--radius-lg);
      }

      .story-card h3,
      .signal-card h3,
      .tool-card h3,
      .principle-card h3,
      .education-card h3,
      .timeline-content h3 {
        font-size: 1.3rem;
      }

      .card-copy,
      .timeline-copy {
        margin: 12px 0 0;
        color: var(--muted);
      }

      .tag-row {
        margin-top: 18px;
      }

      .tag {
        font-size: 0.84rem;
        background: rgba(255, 255, 255, 0.72);
      }

      .tag.highlight {
        color: var(--accent-deep);
        border-color: rgba(231, 105, 46, 0.2);
        background: var(--accent-soft);
      }

      .timeline {
        position: relative;
        padding-left: 26px;
      }

      .timeline::before {
        content: '';
        position: absolute;
        left: 7px;
        top: 10px;
        bottom: 10px;
        width: 2px;
        background: linear-gradient(180deg, rgba(231, 105, 46, 0.55), rgba(31, 122, 114, 0.45));
      }

      .timeline-item {
        position: relative;
        display: grid;
        grid-template-columns: 160px minmax(0, 1fr);
        gap: 20px;
        padding: 6px 0 24px;
      }

      .timeline-item:last-child {
        padding-bottom: 0;
      }

      .timeline-item::before {
        content: '';
        position: absolute;
        left: -23px;
        top: 14px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--paper-strong);
        border: 4px solid var(--accent);
        box-shadow: 0 0 0 6px rgba(231, 105, 46, 0.12);
      }

      .timeline-period {
        color: var(--accent-deep);
        font-size: 0.78rem;
        padding-top: 6px;
      }

      .timeline-company {
        margin-top: 6px;
        color: var(--accent-alt);
        font-weight: 800;
      }

      .timeline-impact {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        color: var(--ink);
      }

      .signal-grid,
      .tool-grid,
      .principle-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .signal-meta {
        display: inline-flex;
        margin-top: 14px;
        color: var(--accent-deep);
        font-size: 0.74rem;
      }

      .tool-list strong {
        color: var(--ink);
      }

      .education-card {
        display: grid;
        gap: 14px;
      }

      .education-line {
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line);
      }

      .education-line:last-child {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .education-line strong {
        display: block;
        font-size: 1rem;
      }

      .education-line span {
        color: var(--muted);
      }

      .principle-card {
        min-height: 100%;
      }

      .principle-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        margin-bottom: 14px;
        border-radius: 50%;
        background: var(--accent-soft);
        color: var(--accent-deep);
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1rem;
        font-weight: 700;
      }

      .closing {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
        gap: 18px;
        align-items: start;
      }

      .closing-quote {
        font-size: 1.18rem;
        color: var(--ink);
        font-weight: 700;
        line-height: 1.6;
      }

      .closing-note {
        margin: 14px 0 0;
        color: var(--muted);
      }

      .callout {
        padding: 22px;
        border-radius: var(--radius-lg);
        background: linear-gradient(180deg, rgba(231, 105, 46, 0.1), rgba(31, 122, 114, 0.08));
        border: 1px solid rgba(31, 36, 48, 0.12);
      }

      .callout h3 {
        margin-bottom: 10px;
      }

      [data-reveal] {
        opacity: 0;
        transform: translateY(26px);
        transition:
          opacity 650ms ease,
          transform 650ms ease;
      }

      [data-reveal].is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes drift {
        from {
          transform: translate3d(0, 0, 0) scale(1);
        }

        to {
          transform: translate3d(12px, -18px, 0) scale(1.08);
        }
      }

      @media (max-width: 980px) {
        .hero,
        .closing,
        .timeline-item,
        .signal-grid,
        .tool-grid,
        .principle-grid,
        .card-grid {
          grid-template-columns: 1fr;
        }

        .page {
          width: min(var(--page-width), calc(100% - 20px));
          padding-top: 36px;
        }
      }

      @media (max-width: 640px) {
        .section-shell {
          padding: 24px 20px;
          border-radius: 26px;
        }

        .hero-top {
          flex-direction: column;
          align-items: stretch;
        }

        .lang-switcher {
          align-self: flex-start;
        }

        h1 {
          font-size: 2.8rem;
        }

        .metric-grid {
          grid-template-columns: 1fr;
        }

        .link-row,
        .chip-row,
        .tag-row {
          gap: 10px;
        }

        .link-pill,
        .chip,
        .tag {
          width: 100%;
          justify-content: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }

        .ambient,
        [data-reveal] {
          animation: none;
          transition: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>

    <main class="page">

        <div class="hero-copy">
          <div class="hero-top">

      <section class="section-shell" data-reveal>
        <div class="section-heading">

      <section class="section-shell" data-reveal>
        <div class="section-heading">

        </div>
        <div class="tool-grid" id="toolbox-grid"></div>
      </section>

      <section class="section-shell" data-reveal>
        <div class="section-heading">
          <div class="section-kicker" id="working-kicker"></div>
          <h2 id="working-title"></h2>
          <p class="section-description" id="working-description"></p>
        </div>
        <div class="principle-grid" id="principle-grid"></div>
      </section>

      <section class="section-shell" data-reveal>
        <div class="closing">
          <div>
            <div class="section-kicker" id="next-kicker"></div>
            <h2 id="next-title"></h2>
            <p class="closing-quote" id="next-quote"></p>
            <p class="closing-note" id="next-note"></p>

          <aside class="callout">
            <h3 id="callout-title"></h3>
            <p class="card-copy" id="callout-copy"></p>
            <div class="tag-row" id="callout-tags"></div>
          </aside>
        </div>
      </section>
    </main>

              <article class="stat-card">
                <span class="stat-value">${stat.value}</span>
                <div class="stat-label">${stat.label}</div>
              </article>
            `
          )
          .join('');

      const renderStoryCards = cards =>
        cards
          .map(
            card => `
              <article class="story-card">
                <h3>${card.title}</h3>
                <p class="card-copy">${card.copy}</p>
                <div class="tag-row">${renderTags(card.tags)}</div>
              </article>
            `
          )
          .join('');

      const renderTimeline = items =>
        items
          .map(
            item => `
              <article class="timeline-item">
                <div>
                  <div class="timeline-period">${item.period}</div>
                  <div class="timeline-company">${item.company}</div>
                </div>
                <div class="timeline-content">
                  <h3>${item.title}</h3>
                  <p class="timeline-copy">${item.copy}</p>
                  <ul class="timeline-points">${renderListItems(item.bullets)}</ul>
                  <div class="timeline-impact">${item.impact}</div>
                </div>
              </article>
            `
          )
          .join('');

      const renderSignalCards = cards =>
        cards
          .map(
            card => `
              <article class="signal-card">
                <h3>${card.title}</h3>
                <ul class="signal-list">${renderListItems(card.items)}</ul>
                <span class="signal-meta">${card.meta}</span>
              </article>
            `
          )
          .join('');

      const renderToolCards = cards =>
        cards
          .map(
            card => `
              <article class="tool-card">
                <h3>${card.title}</h3>
                <ul class="tool-list">${renderListItems(card.items)}</ul>
              </article>
            `
          )
          .join('');

      const renderPrinciples = (principles, educationTitle, education) => {
        const principleCards = principles
          .map(
            (item, index) => `
              <article class="principle-card">
                <span class="principle-number">${index + 1}</span>
                <h3>${item.title}</h3>
                <p class="card-copy">${item.copy}</p>
              </article>
            `
          )
          .join('');

        const educationCard = `
          <article class="education-card">
            <h3>${educationTitle}</h3>
            ${education
              .map(
                item => `
                  <div class="education-line">
                    <strong>${item.title}</strong>
                    <span>${item.date}</span>
                  </div>
                `
              )
              .join('')}
          </article>
        `;

        return principleCards + educationCard;
      };

      const renderLinks = () =>
        links.map(link => `<a class="link-pill" href="${link.href}">${link.label}</a>`).join('');

      function applyLanguage(lang) {
        const data = content[lang] || content.en;
        document.documentElement.lang = lang;
        document.title = data.title;
        document.querySelector('meta[name="description"]').setAttribute('content', data.description);

        setText('philosophy', data.philosophy);
        setText('name', data.name);
        setText('hero-role', data.role);
        setText('hero-summary', data.summary);
        setHtml('link-row', renderLinks());
        setHtml('chip-row', data.chips.map(chip => `<span class="chip">${chip}</span>`).join(''));
        setText('signals-label', data.signalsLabel);
        setHtml('metric-grid', renderMetricCards(data.stats));
        setText('focus-title', data.focusTitle);
        setHtml('focus-list', renderListItems(data.focusList));

        setText('capability-kicker', data.capability.kicker);
        setText('capability-title', data.capability.title);
        setText('capability-description', data.capability.description);
        setHtml('capability-grid', renderStoryCards(data.capability.cards));

        setText('career-kicker', data.career.kicker);
        setText('career-title', data.career.title);
        setText('career-description', data.career.description);
        setHtml('career-timeline', renderTimeline(data.career.items));

        setText('signals-kicker', data.signals.kicker);
        setText('signals-title', data.signals.title);
        setHtml('signals-grid', renderSignalCards(data.signals.cards));

        setText('toolbox-kicker', data.toolbox.kicker);
        setText('toolbox-title', data.toolbox.title);
        setHtml('toolbox-grid', renderToolCards(data.toolbox.cards));

        setText('working-kicker', data.working.kicker);
        setText('working-title', data.working.title);
        setText('working-description', data.working.description);
        setHtml(
          'principle-grid',
          renderPrinciples(data.working.principles, data.working.educationTitle, data.working.education)
        );

        setText('next-kicker', data.next.kicker);
        setText('next-title', data.next.title);
        setText('next-quote', data.next.quote);
        setText('next-note', data.next.note);
        setText('callout-title', data.next.calloutTitle);
        setText('callout-copy', data.next.calloutCopy);
        setHtml('callout-tags', renderTags(data.next.calloutTags));

        document.querySelectorAll('.lang-btn').forEach(button => {
          const active = button.dataset.langTarget === lang;
          button.classList.toggle('is-active', active);
          button.setAttribute('aria-pressed', String(active));
        });

        localStorage.setItem('resume-lang', lang);
        const url = new URL(window.location.href);
        if (lang === 'en') {
          url.searchParams.delete('lang');
        } else {
          url.searchParams.set('lang', lang);
        }
        history.replaceState({}, '', url);
      }

      const preferredLang =
        new URLSearchParams(window.location.search).get('lang') ||
        localStorage.getItem('resume-lang') ||
        'en';

      document.querySelectorAll('.lang-btn').forEach(button => {
        button.addEventListener('click', () => applyLanguage(button.dataset.langTarget));
      });

      applyLanguage(preferredLang === 'ko' ? 'ko' : 'en');

      const observer = new IntersectionObserver(
        entries => {
          for (const entry of entries) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
            }
          }
        },
        { threshold: 0.16 }
      );

      document.querySelectorAll('[data-reveal]').forEach(element => observer.observe(element));
    </script>
  </body>
</html>
